name: Create Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: get_version
        run: |
          # Remove 'v' prefix from version for scoop manifest
          TAG=${GITHUB_REF#refs/tags/}
          VER=${TAG#v}
          echo "TAG=$TAG" >> $GITHUB_OUTPUT
          echo "VER=$VER" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.get_version.outputs.TAG }}
          name: WinSpec ${{ steps.get_version.outputs.TAG }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.get_version.outputs.TAG, '-rc') || contains(steps.get_version.outputs.TAG, '-beta') || contains(steps.get_version.outputs.TAG, '-alpha') }}

      - name: Update Scoop manifest
        run: |
          TAG=${{ steps.get_version.outputs.VER }}
          
          # Update winspec.json using jq
          jq --arg version "$TAG" \
             --arg url "https://github.com/lvyuemeng/winspec/archive/refs/tags/v$TAG.zip" \
             --arg extract_dir "winspec-$TAG" \
             '.version = $version | .url = $url | .extract_dir = $extract_dir' \
             winspec.json > winspec.json.tmp && mv winspec.json.tmp winspec.json

      - name: Commit updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add winspec.json
          git commit -m "chore: update scoop manifest for ${{ steps.get_version.outputs.TAG }}" || echo "No changes to commit"
          
      - name: Push changes
        run: |
          # Push to main branch with full refname
          git push origin HEAD:refs/heads/main
