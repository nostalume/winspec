name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Pester
        shell: pwsh
        run: |
          Install-Module -Name Pester -Force -SkipPublisherCheck -MinimumVersion 5.0.0
          Import-Module Pester -Force

      - name: Run tests with detailed output
        shell: pwsh
        run: |
          Import-Module Pester -Force
          
          # Configure Pester for detailed output
          $config = New-PesterConfiguration
          $config.Run.Path = "./winspec/tests"
          $config.Output.Verbosity = "Detailed"
          $config.Output.RenderMode = "Plaintext"
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputPath = "./TestResults.xml"
          $config.TestResult.OutputFormat = "JUnitXml"
          $config.CodeCoverage.Enabled = $false
          $config.Run.PassThru = $true
          
          # Run tests and capture result
          $result = Invoke-Pester -Configuration $config
          
          # Print summary
          Write-Host "=========================================="
          Write-Host "Test Results Summary:"
          Write-Host "  Total: $($result.TotalCount)"
          Write-Host "  Passed: $($result.PassedCount)"
          Write-Host "  Failed: $($result.FailedCount)"
          Write-Host "  Skipped: $($result.SkippedCount)"
          Write-Host "  Duration: $($result.Duration.TotalSeconds)s"
          Write-Host "=========================================="
          
          # Print failed tests details
          if ($result.FailedCount -gt 0) {
            Write-Host ""
            Write-Host "Failed Tests:"
            foreach ($test in $result.Failed) {
              Write-Host "  - $($test.ExpandedName)"
              Write-Host "    Error: $($test.ErrorMessage)"
            }
            Write-Host ""
          }
          
          # Exit with error if tests failed
          if ($result.FailedCount -gt 0) {
            exit 1
          }

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults.xml
          retention-days: 30
